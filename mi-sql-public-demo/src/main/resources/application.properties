# Azure SQL Database — Managed Identity (Active Directory MSI)
# No password required; authentication delegates to the user-assigned managed identity.
AZURE_SQLDB_CONNECTIONSTRING=jdbc:sqlserver://${AZ_DATABASE_SERVER_NAME}.database.windows.net:1433;database=demo;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;authentication=ActiveDirectoryMSI;msiClientId=${AZURE_CLIENT_ID};