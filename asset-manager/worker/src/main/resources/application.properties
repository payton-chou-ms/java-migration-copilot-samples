# Azure deployment region (Blob/Service Bus derive region from endpoint; set for informational purposes)
azure.region=${AZURE_REGION:eastus}

# Azure Blob Storage Configuration
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:${AZURE_STORAGE_BLOB_CONTAINER_NAME:assets}}

# Application name
spring.application.name=assets-manager-worker

# Azure Service Bus Configuration (passwordless / managed identity)
spring.cloud.azure.servicebus.namespace=${SERVICEBUS_NAMESPACE:${AZURE_SERVICEBUS_NAMESPACE:}}
spring.cloud.azure.credential.managed-identity-enabled=true

# Azure Database for PostgreSQL (passwordless / managed identity)
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/assets_manager?sslmode=require}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.azure.passwordless-enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Azure OpenAI (gpt-image-2) for AI style variations (passwordless / managed identity)
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:}
azure.openai.endpoints=${AZURE_OPENAI_ENDPOINTS:}
azure.openai.image-deployment=${AZURE_OPENAI_IMAGE_DEPLOYMENT:gpt-image-2}
azure.openai.image-api-version=${AZURE_OPENAI_IMAGE_API_VERSION:2025-04-01-preview}
azure.openai.image-size=${AZURE_OPENAI_IMAGE_SIZE:1024x1024}