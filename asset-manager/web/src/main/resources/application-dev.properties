# ─── Local dev overrides ────────────────────────────────────────────────────
# Service Bus: placeholder to satisfy Spring Cloud Azure condition evaluator.
# The ServiceBusConfig bean is @Profile("!dev") so no real connection is made.
spring.cloud.azure.servicebus.namespace=local-dev-placeholder

# Azure Storage: placeholder; LocalFileStorageService uses local filesystem.
azure.storage.account-name=local-dev-placeholder

# PostgreSQL: plain local Docker instance (no SSL, password auth)
spring.datasource.url=jdbc:postgresql://localhost:5432/assets_manager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.azure.passwordless-enabled=false
spring.cloud.azure.credential.managed-identity-enabled=false
